# portals.example.yml — Job Portal and Company List
# Copy this file to portals.yml (gitignored) and customize it.
# Set skip: true for companies you'd never apply to.
# Add your own entries at the bottom.

# ─────────────────────────────────────────────
# CLOUD PROVIDERS
# ─────────────────────────────────────────────

cloud_providers:
  - name: "Amazon Web Services (AWS)"
    careers_url: "https://www.amazon.jobs/en/teams/aws"
