# ─────────────────────────────────────────────
# JOB BOARDS
# ─────────────────────────────────────────────

job_boards:
  - name: "LinkedIn Jobs"
    url: "https://www.linkedin.com/jobs/"
    filters:
      - "SOC Analyst remote"
      - "Cloud Security Engineer remote"
      - "DevSecOps Engineer remote"
      - "Cloud Engineer Charlotte NC"
    notes: "Set Easy Apply filter OFF for quality roles"

  - name: "Wellfound (AngelList)"
    url: "https://wellfound.com/jobs"
    filters:
      - "security engineer"
      - "cloud engineer"
    notes: "Good for startup cloud/security roles"

  - name: "Dice"
    url: "https://www.dice.com"
    filters:
      - "cloud security engineer"
      - "SOC analyst"
      - "cybersecurity analyst"
    notes: "Tech-focused job board, good for cloud/cyber"

  - name: "RemoteOK"
    url: "https://remoteok.com"
    filters:
      - "security"
      - "cloud"
      - "devsecops"
    notes: "Remote-only roles, check daily"

  - name: "CyberSecJobs"
    url: "https://www.cybersecjobs.com"
    filters:
      - "SOC analyst"
      - "security analyst"
    notes: "Cybersecurity-specific board"
